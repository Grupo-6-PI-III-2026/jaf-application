spring.application.name=jaf-application

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:jaf_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.flyway.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:jaf_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.flyway.user=${DB_USER:root}
spring.flyway.password=${DB_PASSWORD:root}
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

server.port=${PORT:8080}
app.cors.allowed-origins=http://localhost:5173,http://localhost,http://localhost:80
spring.main.allow-bean-definition-overriding=true


server.error.include-message=always
server.error.include-binding-errors=always

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.validity=${JWT_EXPIRATION}


