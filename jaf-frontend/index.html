<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Login e Obras</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="container">
        <h2>Painel do Sistema</h2>

        <div id="mensagens" class="mensagens"></div>

        <div class="card">
            <div class="card_title">Login de Usuário</div>
            
            <div class="form_group">
                <label for="input_login_email">E-mail:</label>
                <input type="email" id="input_login_email" placeholder="Digite o e-mail">
            </div>

            <div class="form_group">
                <label for="input_login_senha">Senha:</label>
                <input type="password" id="input_login_senha" placeholder="Digite a senha">
            </div>

            <div class="button_group">
                <button onclick="login()">Entrar</button>
            </div>
        </div>

        <div class="card">
            <div class="card_title">Cadastro de Usuário (Apenas Admin)</div>
            
            <div class="form_group">
                <label for="input_cadastro_nome">Nome:</label>
                <input type="text" id="input_cadastro_nome" placeholder="Digite o nome">
            </div>

            <div class="form_group">
                <label for="input_cadastro_email">E-mail:</label>
                <input type="email" id="input_cadastro_email" placeholder="Digite o e-mail">
            </div>

            <div class="form_group">
                <label for="input_cadastro_senha">Senha:</label>
                <input type="password" id="input_cadastro_senha" placeholder="Digite a senha">
            </div>

            <div class="form_group">
                <label for="input_cadastro_role">Perfil:</label>
                <select id="input_cadastro_role">
                    <option value="">Selecione o perfil</option>
                    <option value="GESTOR_OBRA">Gestor de Obra - Lançamentos e Relatórios</option>
                    <option value="OPERADOR_LANCAMENTO">Operador - Lançamentos do Dia a Dia</option>
                </select>
            </div>

            <div class="button_group">
                <button onclick="CriarUser()">Cadastrar Usuário</button>
            </div>
        </div>

        <div class="card">
            <div class="card_title"> Consulta de Obras</div>
            
            <div class="button_group" style="margin-bottom: 15px;">
                <button onclick="obras()">Ver Todas as Obras</button>
            </div>

            <div class="form_group">
                <label for="input_obra">Buscar Obra Específica (ID):</label>
                <input type="text" id="input_obra" placeholder="Digite o ID da obra">
            </div>

            <button onclick="obra()">Buscar Obra Específica</button>
        </div>

        <div class="card">
            <div class="card_title"> Administração</div>
            <button onclick="buscar()">Buscar Todos os Usuários</button>
        </div>

        <div class="card">
    <div class="card_title"> Registrar Gasto</div>

    <div class="form_group">
        <label for="input_gasto_obra">Obra:</label>
        <select id="input_gasto_obra">
            <option value="">Selecione a obra</option>
        </select>
    </div>

    <div class="form_group">
        <label for="input_gasto_categoria">Categoria:</label>
        <select id="input_gasto_categoria">
            <option value="">Selecione a categoria</option>
            <option value="servico">Serviço</option>
            <option value="material">Material</option>
            <option value="outro">Outro</option>
        </select>
    </div>

    <div class="form_group">
        <label for="input_gasto_pagamento">Forma de Pagamento:</label>
        <select id="input_gasto_pagamento">
            <option value="">Selecione a forma de pagamento</option>
            <option value="cartao_credito">Cartão de Crédito</option>
            <option value="cartao_debito">Cartão de Débito</option>
            <option value="dinheiro">Dinheiro</option>
            <option value="pix">Pix</option>
            <option value="transferencia">Transferência</option>
        </select>
    </div>

    <div class="form_group">
        <label for="input_gasto_valor">Valor (R$):</label>
        <input type="number" id="input_gasto_valor" placeholder="Digite o valor" min="0" step="0.01">
    </div>

    <div class="form_group">
        <label for="input_gasto_data">Data:</label>
        <input type="date" id="input_gasto_data">
    </div>

    <div class="form_group">
        <label for="input_gasto_descricao">Descrição:</label>
        <input type="text" id="input_gasto_descricao" placeholder="Descreva o gasto">
    </div>

    <button onclick="registrarGasto()">Registrar Gasto</button>
</div>
    </div>

    <script src="endpoint.js"></script>
</body>
</html>
